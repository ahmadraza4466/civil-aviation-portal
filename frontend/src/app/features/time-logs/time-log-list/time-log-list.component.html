<div class="container-fluid px-4 py-4" style="font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold text-white mb-0 d-flex align-items-center gap-2" style="letter-spacing: 0.1em;">
            <i class="bi bi-clock-history text-primary"></i>Simulator Time Logs
        </h2>
        <div class="d-flex gap-2">
            <button class="btn btn-outline-secondary text-white btn-sm px-3 rounded-pill"
                style="border-color: rgba(255,255,255,0.1);">
                <i class="bi bi-funnel me-1"></i> Filter
            </button>
            <button class="btn btn-primary btn-sm px-3 rounded-pill text-white shadow-sm"
                style="background: linear-gradient(90deg, #4f46e5 0%, #3b82f6 100%); border: none;" (click)="onAdd()">
                <i class="bi bi-plus-lg me-1"></i> New Time Log
            </button>
        </div>
    </div>

    <div class="row mb-4">
        <div class="col-md-3">
            <div class="card bg-transparent border-0 h-100"
                style="background-color: #1e2638 !important; border-radius: 1rem; box-shadow: inset 0 1px 0 rgba(255,255,255,0.05);">
                <div class="card-body p-4 d-flex align-items-center">
                    <div class="rounded-circle p-3 d-flex align-items-center justify-content-center me-3"
                        style="background-color: rgba(59, 130, 246, 0.1); width: 48px; height: 48px;">
                        <i class="bi bi-journals text-primary fs-4"></i>
                    </div>
                    <div>
                        <h6 class="text-secondary mb-1 fw-semibold text-uppercase"
                            style="font-size: 0.7rem; letter-spacing: 0.5px;">Total Logs</h6>
                        <h3 class="text-white fw-bold mb-0">{{ logs.length }}</h3>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <app-reusable-table [data]="logs" [columns]="tableColumns" (add)="onAdd()" (edit)="onEdit($event)"
        (delete)="onDelete($event)"></app-reusable-table>
</div>

<div class="container-fluid py-4">
    <div class="mb-4 d-flex justify-content-between align-items-center">
        <div>
            <h2 class="fw-bold text-white mb-0" style="letter-spacing: 0.1em;"><i
                    class="bi bi-graph-up me-2 text-primary"></i>Reporting Center</h2>
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb mb-0">
                    <li class="breadcrumb-item"><a routerLink="/app/dashboard"
                            style="color: #64748b; text-decoration: none;">Home</a></li>
                    <li class="breadcrumb-item active text-secondary" aria-current="page">Analytics</li>
                </ol>
            </nav>
        </div>
    </div>

    <div class="row">
        <div class="col-lg-8">
            <div class="card dark-panel-card border-0 mb-4 h-100">
                <div class="card-header py-4 border-bottom"
                    style="background-color: transparent; border-color: rgba(255,255,255,0.05) !important;">
                    <h6 class="m-0 font-weight-bold text-secondary text-uppercase"
                        style="letter-spacing: 1px; font-size: 0.75rem;">
                        <i class="bi bi-filter-circle me-2 text-primary"></i>Report Configuration
                    </h6>
                </div>
                <div class="card-body p-4 p-md-5">
                    <form [formGroup]="reportForm" (ngSubmit)="generateReport()">
                        <!-- Date Filter -->
                        <div class="row mb-5">
                            <div class="col-md-6">
                                <label class="form-label detail-label">From Date:</label>
                                <input type="date" class="form-control custom-dark-input" formControlName="dateFrom">
                            </div>
                            <div class="col-md-6 mt-4 mt-md-0">
                                <label class="form-label detail-label">To Date:</label>
                                <input type="date" class="form-control custom-dark-input" formControlName="dateTo">
                            </div>
                        </div>

                        <!-- Selectors -->
                        <div class="row mb-5">
                            <div class="col-md-6">
                                <label class="form-label detail-label">Device:</label>
                                <select class="form-select custom-dark-input shadow-none" formControlName="device">
                                    <option *ngFor="let dev of devices" [value]="dev">{{ dev }}</option>
                                </select>
                            </div>
                            <div class="col-md-6 mt-4 mt-md-0">
                                <label class="form-label detail-label">Status:</label>
                                <select class="form-select custom-dark-input shadow-none" formControlName="status">
                                    <option *ngFor="let st of statuses" [value]="st">{{ st }}</option>
                                </select>
                            </div>
                        </div>

                        <!-- Report Type -->
                        <div class="mb-5">
                            <label class="form-label detail-label mb-3">Report Format:</label>
                            <div class="row g-3">
                                <div class="col-12" *ngFor="let type of reportTypes">
                                    <label class="w-100 p-3 rounded"
                                        style="background-color: rgba(15, 23, 42, 0.4); border: 1px solid rgba(255,255,255,0.05); cursor: pointer; transition: all 0.2s;"
                                        [ngClass]="{'border-primary': reportForm.get('reportType')?.value === type.id}">
                                        <div class="d-flex align-items-center">
                                            <input class="form-check-input mt-0 me-3" type="radio"
                                                formControlName="reportType" [value]="type.id"
                                                style="background-color: transparent; border-color: rgba(255,255,255,0.2);">
                                            <div>
                                                <span class="fs-6 fw-medium display-text">{{ type.name }}</span>
                                                <div class="text-secondary small mt-1" style="font-size: 0.75rem;">
                                                    <i class="bi"
                                                        [ngClass]="type.id.includes('pdf') ? 'bi-file-earmark-pdf text-danger' : 'bi-file-earmark-word text-primary'"></i>
                                                    Generates a downloadable {{ type.id.includes('pdf') ? 'PDF' : 'DOCX'
                                                    }} file.
                                                </div>
                                            </div>
                                        </div>
                                    </label>
                                </div>
                            </div>
                        </div>

                        <div class="d-flex justify-content-end align-items-center mt-3 pt-4 border-top"
                            style="border-color: rgba(255,255,255,0.05) !important;">
                            <button type="submit"
                                class="btn btn-neon-blue btn-pill px-5 py-2 d-flex align-items-center tracking-wide"
                                [disabled]="isGenerating">
                                <span *ngIf="isGenerating" class="spinner-border spinner-border-sm me-2"></span>
                                <i *ngIf="!isGenerating" class="bi bi-download me-2"></i>
                                Generate Report
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-lg-4 mt-4 mt-lg-0">
            <div class="card dark-panel-card border-0 h-100">
                <div class="card-header py-4 border-bottom d-flex justify-content-between align-items-center"
                    style="background-color: transparent; border-color: rgba(255,255,255,0.05) !important;">
                    <h6 class="m-0 font-weight-bold text-secondary text-uppercase"
                        style="letter-spacing: 1px; font-size: 0.75rem;">
                        <i class="bi bi-clock-history me-2 text-primary"></i>Download History
                    </h6>
                    <span class="badge"
                        style="background-color: rgba(59, 130, 246, 0.2); color: #3b82f6; border: 1px solid rgba(59, 130, 246, 0.4); border-radius: 50%; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center;">{{
                        downloadHistory.length }}</span>
                </div>
                <div class="card-body p-0" style="max-height: 600px; overflow-y: auto;">
                    <div class="list-group list-group-flush" *ngIf="downloadHistory.length > 0; else noHistory">
                        <div class="list-group-item px-4 py-4" *ngFor="let item of downloadHistory"
                            style="background-color: transparent; border-color: rgba(255,255,255,0.05);">
                            <div class="d-flex w-100 justify-content-between align-items-center mb-2">
                                <h6 class="mb-0 fw-bold text-white fs-6">{{ item.name }}</h6>
                                <small class="text-secondary font-monospace" style="font-size: 0.7rem;">{{ item.date
                                    }}</small>
                            </div>
                            <div class="d-flex align-items-center mt-3">
                                <span class="badge py-1 px-3"
                                    [ngClass]="item.status === 'Generated' || item.status === 'Downloaded' ? 'bg-success bg-opacity-10 text-success border border-success border-opacity-25' : 
                                               item.status === 'Generating...' ? 'bg-warning bg-opacity-10 text-warning border border-warning border-opacity-25' : 
                                               item.status === 'Failed' ? 'bg-danger bg-opacity-10 text-danger border border-danger border-opacity-25' : 'bg-info bg-opacity-10 text-info border border-info border-opacity-25'">
                                    {{ item.status }}
                                </span>
                            </div>
                        </div>
                    </div>
                    <ng-template #noHistory>
                        <div
                            class="text-center py-5 text-secondary px-4 h-100 d-flex flex-column justify-content-center align-items-center opacity-50">
                            <i class="bi bi-journal-x display-3 mb-4 d-block"></i>
                            <p class="mb-0" style="letter-spacing: 0.5px;">No reports generated yet during this session.
                            </p>
                        </div>
                    </ng-template>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    /* Scoped Detail Label matching Form logic */
    .detail-label {
        font-size: 0.65rem;
        color: #64748b;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 0.5rem;
    }
</style>
